<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor — Dr. Tan</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#0b1120;--bg3:#111827;--surface:#161f30;
  --border:#1e2d45;--cyan:#00e5ff;--violet:#a78bfa;--green:#10b981;
  --amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;
  --mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.97);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.tb-brand{font-family:var(--mono);font-size:0.72rem;color:var(--amber);}
.tb-status{font-family:var(--mono);font-size:0.68rem;color:var(--green);display:flex;align-items:center;gap:0.4rem;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.tb-links{display:flex;gap:0.4rem;}
.tb-link{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-decoration:none;padding:0.3rem 0.65rem;border:1px solid var(--border);border-radius:5px;}
.tb-link:hover{color:var(--cyan);border-color:var(--cyan);}

/* LEFT NAV */
#left-nav{position:fixed;left:0;top:0;bottom:0;width:52px;background:#0a0d14;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding-top:4rem;gap:0.25rem;z-index:200;}
#left-nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;width:40px;height:40px;border-radius:8px;text-decoration:none;font-size:1.1rem;color:var(--muted);cursor:pointer;transition:background 0.15s,color 0.15s;}
#left-nav a:hover{background:var(--bg3);color:var(--amber);}
#left-nav .nav-label{font-size:0.38rem;font-family:var(--mono);text-transform:uppercase;margin-top:1px;}
#left-nav .nav-div{width:28px;height:1px;background:var(--border);margin:0.3rem 0;}

/* LAYOUT */
#cmd{padding-left:52px;}
.main{display:grid;grid-template-columns:300px 1fr;gap:1rem;padding:1rem;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-header{padding:0.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--sans);font-weight:600;font-size:0.85rem;}
.card-body{padding:1rem;}

/* ROSTER */
.roster-count{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--cyan);}
.roster-sub{font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;}
.roster-list{display:flex;flex-direction:column;gap:0.4rem;max-height:300px;overflow-y:auto;}
.roster-item{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.6rem;background:var(--bg3);border-radius:6px;font-size:0.78rem;}
.ri-num{font-family:var(--mono);font-size:0.6rem;color:var(--muted);min-width:18px;}
.ri-name{flex:1;font-weight:500;}
.ri-tag{font-family:var(--mono);font-size:0.6rem;color:var(--cyan);background:rgba(0,229,255,0.08);padding:0.1rem 0.35rem;border-radius:3px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;}
.stat-num{font-family:var(--mono);font-size:1.8rem;font-weight:700;}
.stat-label{font-size:0.7rem;color:var(--muted);margin-top:0.2rem;}

/* ACTIVE QUESTION */
.no-active{padding:2rem;text-align:center;color:var(--muted);font-size:0.82rem;font-family:var(--mono);}
.active-banner{padding:1rem 1.25rem;border-radius:12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);}
.ab-label{font-family:var(--mono);font-size:0.6rem;color:var(--amber);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.3rem;}
.ab-title{font-family:var(--sans);font-weight:700;font-size:1rem;line-height:1.4;}
.ab-meta{font-family:var(--mono);font-size:0.62rem;color:var(--muted);margin-top:0.3rem;}

/* WALL */
.wall-card{background:var(--surface);border:1px solid rgba(239,68,68,0.3);border-radius:12px;overflow:hidden;margin-top:1rem;}
.wall-header{padding:0.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.wall-title{font-family:var(--sans);font-weight:600;font-size:0.85rem;color:var(--red);}
.wall-count{font-family:var(--mono);font-size:0.65rem;color:var(--muted);}
.wall-body{padding:0.75rem 1rem;}
.wall-chips{display:flex;flex-wrap:wrap;gap:0.5rem;}
.wall-chip{font-family:var(--mono);font-size:0.68rem;padding:0.25rem 0.6rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:20px;color:var(--red);}
.all-done{text-align:center;padding:1rem;color:var(--green);}

/* RESULTS */
.results-grid{display:grid;gap:0.5rem;}
.result-bar{background:var(--bg3);border-radius:8px;overflow:hidden;}
.rb-header{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0.75rem;}
.rb-label{font-size:0.8rem;}
.rb-correct{color:var(--green);font-weight:600;}
.rb-val{font-family:var(--mono);font-size:0.7rem;color:var(--muted);}
.rb-track{height:6px;background:var(--bg2);}
.rb-fill{height:100%;background:var(--muted);transition:width 0.4s;}
.rb-fill.correct{background:var(--green);}
</style>
</head>
<body>

<div id="cmd">
  <div class="topbar">
    <div class="tb-brand">🎓 DR. TAN // INSTRUCTOR</div>
    <div class="tb-status"><div class="live-dot"></div><span id="status-text">Live</span></div>
    <div class="tb-links">
      <a href="notes.html" class="tb-link">📝 Notes</a>
      <a href="answers.html" class="tb-link">💡 Answers</a>
      <a href="lecture.html" class="tb-link" target="_blank">📖 Lecture</a>
    </div>
  </div>

  <div id="left-nav">
    <a onclick="document.getElementById('nav-roster').scrollIntoView({behavior:'smooth'})" title="Roster">👥<span class="nav-label">Roster</span></a>
    <div class="nav-div"></div>
    <a onclick="document.getElementById('nav-stats').scrollIntoView({behavior:'smooth'})" title="Stats">📈<span class="nav-label">Stats</span></a>
    <a onclick="document.getElementById('nav-active').scrollIntoView({behavior:'smooth'})" title="Active">❓<span class="nav-label">Active</span></a>
    <a onclick="document.getElementById('wall-card').scrollIntoView({behavior:'smooth'})" title="Wall">⚠<span class="nav-label">Wall</span></a>
    <a onclick="document.getElementById('results-card').scrollIntoView({behavior:'smooth'})" title="Results">✅<span class="nav-label">Results</span></a>
    <div class="nav-div"></div>
    <a href="notes.html" title="Notes">📝<span class="nav-label">Notes</span></a>
    <a href="answers.html" title="Answers">💡<span class="nav-label">Answers</span></a>
  </div>

  <div class="main">
    <!-- LEFT: ROSTER -->
    <div class="left">
      <div class="card" id="nav-roster">
        <div class="card-header">
          <span class="card-title">Class Roster</span>
          <div class="live-dot"></div>
        </div>
        <div class="card-body">
          <div class="roster-count" id="roster-count">0</div>
          <div class="roster-sub" id="roster-sub">students registered</div>
          <div class="roster-list" id="roster-list">
            <div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);">Loading...</div>
          </div>
          <button onclick="clearRoster()" style="margin-top:0.75rem;width:100%;padding:0.4rem;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:0.65rem;">Clear Roster</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: LIVE STATUS -->
    <div class="right">
      <div class="stats-row" id="nav-stats">
        <div class="stat-card"><div class="stat-num" id="stat-students">0</div><div class="stat-label">Students In</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-responded" style="color:var(--green);">0</div><div class="stat-label">Responded</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-pending" style="color:var(--red);">0</div><div class="stat-label">Pending</div></div>
      </div>

      <div class="card" id="nav-active">
        <div class="card-header"><span class="card-title">Active Question</span></div>
        <div class="card-body">
          <div class="no-active" id="no-active">No question active</div>
          <div id="active-q-display" style="display:none;">
            <div class="active-banner">
              <div class="ab-label">Live Now</div>
              <div class="ab-title" id="active-q-text">—</div>
              <div class="ab-meta" id="active-q-meta">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="wall-card" id="wall-card" style="display:none;">
        <div class="wall-header">
          <span class="wall-title">⚠ Haven't Answered</span>
          <span class="wall-count" id="wall-count">0 pending</span>
        </div>
        <div class="wall-body"><div class="wall-chips" id="wall-chips"></div></div>
      </div>

      <div class="card" id="results-card" style="display:none;margin-top:1rem;">
        <div class="card-header">
          <span class="card-title">Live Results</span>
          <span id="results-count" style="font-family:var(--mono);font-size:0.68rem;color:var(--green);">0 responses</span>
        </div>
        <div class="card-body"><div class="results-grid" id="results-grid"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://rm-students.teikkheong.workers.dev';
const KEY = 'rm_v2';

// ── ACCESS CONTROL — bookmark: instructor.html?pin=6664 ──
(function(){
  var p = new URLSearchParams(window.location.search);
  if(p.get('pin') !== '6664'){
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0e1a;color:#ef4444;font-family:monospace;font-size:1.2rem;">Access denied.</div>';
    return;
  }
  init();
})();

// ── INIT ──
function init(){
  renderRoster();
  setInterval(renderRoster, 5000);
  startPoll();
}

// ── ROSTER ──
let cachedStudents = [];
async function renderRoster(){
  try {
    const ctrl = new AbortController();
    setTimeout(()=>ctrl.abort(), 4000);
    const r = await fetch(API+'/students', {signal:ctrl.signal});
    const data = await r.json();
    if(Array.isArray(data) && data.length > 0){
      cachedStudents = data;
      localStorage.setItem(KEY, JSON.stringify(data));
    } else {
      try{ cachedStudents = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch{}
    }
  } catch(e){
    try{ cachedStudents = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch{}
    document.getElementById('status-text').textContent = 'Offline';
  }
  const s = cachedStudents;
  document.getElementById('roster-count').textContent = s.length;
  document.getElementById('stat-students').textContent = s.length;
  document.getElementById('roster-sub').textContent = 'student'+(s.length!==1?'s':'')+' registered';
  const list = document.getElementById('roster-list');
  if(!s.length){ list.innerHTML='<div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);">No students yet</div>'; return; }
  list.innerHTML = s.map((st,i)=>`
    <div class="roster-item">
      <span class="ri-num">${i+1}</span>
      <span class="ri-name">${st.first} ${st.last}</span>
      <span class="ri-tag">${st.country||'?'}</span>
    </div>`).join('');
}

async function clearRoster(){
  if(!confirm('Clear ALL student registrations? Cannot be undone.')) return;
  try {
    const ctrl = new AbortController();
    setTimeout(()=>ctrl.abort(), 5000);
    await fetch(API+'/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:'drtan2025clear'}),signal:ctrl.signal});
    localStorage.removeItem(KEY);
    cachedStudents = [];
    renderRoster();
  } catch(e){ alert('Error: '+e.message); }
}

// ── POLL ──
function startPoll(){ poll(); setInterval(poll, 2500); }

async function poll(){
  let students = [];
  try{ students = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch{}

  let state={}, allResp={};
  try {
    const ctrl = new AbortController();
    setTimeout(()=>ctrl.abort(), 4000);
    const [sr,rr] = await Promise.all([
      fetch(API+'/quiz/state',{signal:ctrl.signal}),
      fetch(API+'/quiz/responses',{signal:ctrl.signal})
    ]);
    state = await sr.json();
    allResp = await rr.json();
    document.getElementById('status-text').textContent = 'Live';
  } catch(e){
    document.getElementById('status-text').textContent = 'Offline';
    return;
  }

  if(!state.activeQ){
    document.getElementById('no-active').style.display='block';
    document.getElementById('active-q-display').style.display='none';
    document.getElementById('wall-card').style.display='none';
    document.getElementById('results-card').style.display='none';
    document.getElementById('stat-responded').textContent='0';
    document.getElementById('stat-pending').textContent='0';
    return;
  }

  const qId = state.activeQ;
  const responses = allResp[qId]||[];
  const respondedNames = new Set(responses.map(r=>(r.name||'').toLowerCase().trim()));
  const pending = students.filter(s=>{
    const full=(s.first+' '+s.last).toLowerCase().trim();
    return !respondedNames.has(full)&&![...respondedNames].some(n=>n.includes(s.first.toLowerCase())&&n.includes(s.last.toLowerCase()));
  });

  document.getElementById('stat-responded').textContent = responses.length;
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('no-active').style.display='none';
  document.getElementById('active-q-display').style.display='block';
  document.getElementById('active-q-text').textContent = state.questionText||qId;
  document.getElementById('active-q-meta').textContent = 'Question ID: '+qId;
  document.getElementById('wall-card').style.display='block';
  document.getElementById('results-card').style.display='block';
  document.getElementById('wall-count').textContent = pending.length+' pending';
  document.getElementById('wall-chips').innerHTML = pending.length===0
    ? '<div class="all-done">🎉 Everyone responded!</div>'
    : pending.map(s=>`<div class="wall-chip">${s.first} ${s.last}</div>`).join('');

  if(responses.length && state.options){
    const opts = state.options;
    const counts={};
    opts.forEach((_,i)=>counts[i]=0);
    responses.forEach(r=>{
      const idx=opts.findIndex(o=>o===r.answer||o.toLowerCase().includes((r.answer||'').toLowerCase()));
      if(idx>=0) counts[idx]=(counts[idx]||0)+1;
    });
    const total=responses.length||1;
    document.getElementById('results-count').textContent=responses.length+' responses';
    document.getElementById('results-grid').innerHTML=opts.map((opt,i)=>{
      const pct=Math.round(((counts[i]||0)/total)*100);
      const correct=i===state.correctIndex;
      return `<div class="result-bar"><div class="rb-header"><span class="rb-label ${correct?'rb-correct':''}">${String.fromCharCode(65+i)}) ${opt} ${correct?'✓':''}</span><span class="rb-val">${counts[i]||0} · ${pct}%</span></div><div class="rb-track"><div class="rb-fill ${correct?'correct':''}" style="width:${pct}%"></div></div></div>`;
    }).join('');
  }
}
</script>
</body>
</html>
