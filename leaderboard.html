<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Dr. Tan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#020817;color:#e2e8f0;font-family:Arial,sans-serif;min-height:100vh;padding:1.5rem;}
h1{font-size:1.6rem;font-weight:700;color:#00e5ff;margin-bottom:0.25rem;font-family:monospace;}
.sub{color:#64748b;font-size:0.85rem;margin-bottom:1.5rem;}
.filters{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.fb{padding:0.4rem 1rem;border:1px solid #1e2d45;border-radius:6px;background:transparent;color:#64748b;cursor:pointer;font-size:0.85rem;}
.fb.active{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,0.08);}
table{width:100%;border-collapse:collapse;}
th{padding:0.6rem 1rem;text-align:left;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#64748b;border-bottom:1px solid #1e2d45;}
td{padding:0.75rem 1rem;border-bottom:1px solid #0f172a;font-size:0.95rem;}
tr:hover td{background:rgba(255,255,255,0.02);}
.bar{height:6px;background:#1e2d45;border-radius:3px;margin-top:4px;}
.bar-fill{height:100%;border-radius:3px;}
.empty{text-align:center;padding:4rem;color:#64748b;}
.refresh{font-family:monospace;font-size:0.72rem;color:#64748b;margin-top:1rem;display:flex;justify-content:space-between;align-items:center;}
.ref-btn{padding:0.3rem 0.75rem;border:1px solid #1e2d45;border-radius:5px;background:transparent;color:#64748b;cursor:pointer;font-size:0.72rem;}
.ref-btn:hover{color:#00e5ff;border-color:#00e5ff;}
</style>
</head>
<body>
<h1>🏆 Live Leaderboard</h1>
<div class="sub">Research Methods — Dr. Tan · <span id="last-update">Loading...</span></div>
<div class="filters" id="filters">
  <button class="fb active" onclick="setFilter('all',this)">All Sections</button>
  <button class="fb" onclick="setFilter(0,this)">Quiz 1</button>
  <button class="fb" onclick="setFilter(1,this)">Quiz 2</button>
  <button class="fb" onclick="setFilter(2,this)">Quiz 3</button>
  <button class="fb" onclick="setFilter(3,this)">Quiz 4</button>
  <button class="fb" onclick="setFilter(4,this)">Quiz 5</button>
</div>
<div id="board"></div>
<div class="refresh">
  <span id="status"></span>
  <button class="ref-btn" onclick="load()">⟳ Refresh</button>
</div>

<script>
var REPO='ProfDrTan/research-methods';
var currentFilter='all';
var LABELS=['Scales & Tendency','Distribution & Correlation','Inferential Tests','SEM Foundations','Advanced SEM','Mixed Methods'];

function rawUrl(f){return 'https://raw.githubusercontent.com/'+REPO+'/main/'+f+'?t='+Date.now();}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  load();
}

function load(){
  document.getElementById('status').textContent='Loading...';
  fetch(rawUrl('scores.json'))
    .then(function(r){return r.json();})
    .then(function(scores){
      if(!Array.isArray(scores)) scores=[];
      var filtered=currentFilter==='all'?scores:scores.filter(function(s){return s.section==currentFilter;});
      filtered.sort(function(a,b){return b.pct-a.pct||b.score-a.score;});
      var el=document.getElementById('board');
      if(!filtered.length){el.innerHTML='<div class="empty">No scores yet — students are still taking the quiz.</div>';}
      else{
        var medals=['🥇','🥈','🥉'];
        var html='<table><thead><tr><th>Rank</th><th>Student</th><th>Section</th><th>Score</th><th>Result</th></tr></thead><tbody>';
        filtered.forEach(function(s,i){
          var c=s.pct>=75?'#10b981':s.pct>=50?'#f59e0b':'#ef4444';
          html+='<tr><td style="color:#64748b;font-family:monospace;">'+(i<3?medals[i]:(i+1))+'</td>';
          html+='<td style="font-weight:700;">'+s.name+'</td>';
          html+='<td style="color:#a78bfa;font-size:0.78rem;">Q'+(s.section+1)+' '+(LABELS[s.section]||'')+'</td>';
          html+='<td style="font-family:monospace;color:#00e5ff;">'+s.score+'/'+s.total+'</td>';
          html+='<td><span style="font-weight:700;color:'+c+';">'+s.pct+'%</span><div class="bar"><div class="bar-fill" style="width:'+s.pct+'%;background:'+c+';"></div></div></td></tr>';
        });
        html+='</tbody></table>';
        el.innerHTML=html;
      }
      document.getElementById('last-update').textContent='Updated: '+new Date().toLocaleTimeString();
      document.getElementById('status').textContent=filtered.length+' scores loaded';
    }).catch(function(e){
      document.getElementById('status').textContent='Error: '+e.message;
      document.getElementById('board').innerHTML='<div class="empty">Could not load scores. Try refreshing.</div>';
    });
}

load();
setInterval(load,15000);
</script>
</body>
</html>
